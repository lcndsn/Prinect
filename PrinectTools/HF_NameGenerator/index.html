<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Folder Name Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

<style>
    :root {
        --ink: #1c1a17;
        --ink-soft: #6b6459;
        --paper: #f6f2e9;
        --paper-dark: #ece5d4;
        --card: #fffdf8;
        --steel: #3e5c76;
        --steel-dark: #2f4759;
        --amber: #c97b2e;
        --amber-soft: #e8ddc7;
        --line: #d3c9b2;
        --success: #4a7a52;
    }

    * { box-sizing: border-box; }

    body {
        font-family: 'IBM Plex Sans', Arial, sans-serif;
        background:
            radial-gradient(circle at 1px 1px, rgba(28,26,23,0.05) 1px, transparent 0) 0 0/16px 16px,
            var(--paper);
        color: var(--ink);
        margin: 0;
        padding: 48px 20px 80px;
        min-height: 100vh;
    }

    .wrap {
        max-width: 620px;
        margin: 0 auto;
    }

    .eyebrow {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--amber);
        font-weight: 600;
        margin: 0 0 8px;
    }

    h1 {
        font-family: 'Oswald', Arial, sans-serif;
        font-weight: 700;
        font-size: 34px;
        letter-spacing: 0.01em;
        text-transform: uppercase;
        color: var(--ink);
        margin: 0 0 4px;
    }

    .sub {
        color: var(--ink-soft);
        font-size: 14.5px;
        margin: 0 0 32px;
        max-width: 46ch;
    }

    .ticket {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 10px;
        box-shadow: 0 1px 2px rgba(28,26,23,0.04), 0 12px 32px -18px rgba(28,26,23,0.25);
        overflow: hidden;
    }

    .ticket-head {
        background: var(--ink);
        color: var(--paper);
        padding: 16px 28px;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
    }

    .ticket-head .label {
        font-family: 'Oswald', Arial, sans-serif;
        font-size: 13px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-weight: 600;
        opacity: 0.85;
    }

    .ticket-head .id {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 13px;
        color: var(--amber);
        letter-spacing: 0.04em;
    }

    form {
        padding: 28px 28px 8px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px 16px;
    }

    .campo {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .campo.full {
        grid-column: 1 / -1;
    }

    label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--ink-soft);
    }

    input {
        width: 100%;
        padding: 11px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--paper);
        font-family: 'IBM Plex Sans', Arial, sans-serif;
        font-size: 14.5px;
        color: var(--ink);
        transition: border-color 0.15s ease, background 0.15s ease;
    }

    input:hover {
        border-color: #b9ac8c;
    }

    input:focus-visible {
        outline: none;
        border-color: var(--steel);
        background: var(--card);
        box-shadow: 0 0 0 3px rgba(62,92,118,0.15);
    }

    .actions {
        padding: 22px 28px 26px;
        display: flex;
        gap: 10px;
    }

    button {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 12.5px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 12px 20px;
        border-radius: 6px;
        border: 1px solid transparent;
        cursor: pointer;
        transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
    }

    button:active {
        transform: translateY(1px);
    }

    .btn-primary {
        background: var(--steel);
        color: var(--paper);
        flex: 1;
    }

    .btn-primary:hover {
        background: var(--steel-dark);
    }

    .btn-secondary {
        background: var(--card);
        color: var(--ink);
        border-color: var(--line);
    }

    .btn-secondary:hover {
        border-color: var(--ink-soft);
    }

    button:focus-visible {
        outline: 2px solid var(--steel);
        outline-offset: 2px;
    }

    .stub {
        position: relative;
        margin: 0 28px 28px;
        padding-top: 22px;
    }

    .stub::before {
        content: "";
        position: absolute;
        top: 0;
        left: -28px;
        right: -28px;
        border-top: 2px dashed var(--line);
    }

    .stub::after {
        content: "";
        position: absolute;
        top: -9px;
        left: -37px;
        right: -37px;
        height: 18px;
        background:
            radial-gradient(circle 9px at 0 0, transparent 9px, var(--paper) 9.5px) left / 18px 18px,
            radial-gradient(circle 9px at 100% 0, transparent 9px, var(--paper) 9.5px) right / 18px 18px;
        background-repeat: no-repeat;
        pointer-events: none;
    }

    .stub-label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink-soft);
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .stub-label .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--amber);
    }

    textarea {
        width: 100%;
        min-height: 76px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--amber-soft);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 14px;
        letter-spacing: 0.02em;
        color: var(--ink);
        resize: none;
        line-height: 1.6;
    }

    textarea::placeholder {
        color: var(--ink-soft);
        font-family: 'IBM Plex Sans', Arial, sans-serif;
    }

    textarea:focus-visible {
        outline: none;
        border-color: var(--steel);
    }

    #status {
        margin-top: 10px;
        min-height: 18px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 12.5px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--success);
        display: flex;
        align-items: center;
        gap: 6px;
        opacity: 0;
        transform: translateY(-2px);
        transition: opacity 0.2s ease, transform 0.2s ease;
    }

    #status.show {
        opacity: 1;
        transform: translateY(0);
    }

    @media (max-width: 520px) {
        form {
            grid-template-columns: 1fr;
        }
        .stub, .stub::before, .stub::after {
            left: -20px;
            right: -20px;
        }
        .stub {
            margin-left: 20px;
            margin-right: 20px;
        }
        form, .ticket-head, .actions {
            padding-left: 20px;
            padding-right: 20px;
        }
    }

    @media (prefers-reduced-motion: reduce) {
        * {
            transition: none !important;
        }
    }
</style>
</head>

<body>

<div class="wrap">

    <p class="eyebrow">Ordem de produção</p>
    <h1>Gerador de código</h1>
    <p class="sub">Preencha os dados da ordem para montar o código de identificação, separado por #.</p>

    <div class="ticket">

        <div class="ticket-head">
            <span class="label">Ficha de dados</span>
            <span class="id">#GEN</span>
        </div>

        <form onsubmit="return false;">
            <div class="campo">
                <label for="jobNumber">Job number</label>
                <input id="jobNumber">
            </div>

            <div class="campo">
                <label for="productCode">Product code</label>
                <input id="productCode">
            </div>

            <div class="campo full">
                <label for="jobName">Job name</label>
                <input id="jobName">
            </div>

            <div class="campo">
                <label for="deliveryQuantity">Delivery quantity</label>
                <input id="deliveryQuantity">
            </div>

            <div class="campo">
                <label for="dueDate">Due date</label>
                <input id="dueDate" type="date">
            </div>

            <div class="campo">
                <label for="mediaQuality">Media quality</label>
                <input id="mediaQuality">
            </div>

            <div class="campo">
                <label for="customerId">Customer ID</label>
                <input id="customerId">
            </div>
        </form>

        <div class="actions">
            <button class="btn-primary" onclick="gerarTexto()">Gerar texto</button>
            <button class="btn-secondary" onclick="copiarTexto()">Copiar</button>
        </div>

        <div class="stub">
            <div class="stub-label"><span class="dot"></span>Código gerado</div>
            <textarea id="resultado" readonly placeholder="O código aparece aqui depois de gerado."></textarea>
            <div id="status">✓ Texto copiado!</div>
        </div>

    </div>
</div>

<script>

function gerarTexto() {

    let dueDate =
        document.getElementById("dueDate").value
        .replaceAll("-", "");

    const texto = [
        document.getElementById("jobNumber").value,
        document.getElementById("jobName").value,
        document.getElementById("productCode").value,
        document.getElementById("deliveryQuantity").value,
        dueDate,
        document.getElementById("mediaQuality").value,
        document.getElementById("customerId").value
    ].join("#");

    document.getElementById("resultado").value = texto;
    document.getElementById("status").classList.remove("show");
}

async function copiarTexto() {

    const texto =
        document.getElementById("resultado").value;

    if (!texto) {
        alert("Gere o texto primeiro.");
        return;
    }

    await navigator.clipboard.writeText(texto);

    const status = document.getElementById("status");
    status.classList.add("show");
    clearTimeout(window._statusTimeout);
    window._statusTimeout = setTimeout(() => status.classList.remove("show"), 2200);
}

</script>

</body>
</html>
