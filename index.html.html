<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LCNDSN - Prepress Tools</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Inter,sans-serif;

    background:#fafafa;

    color:#111;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}

.container{

    width:min(850px,90%);

}

header{

    text-align:center;

    margin-bottom:70px;

}

h1{

    font-size:70px;

    font-weight:700;

    letter-spacing:.35em;

}

.subtitle{

    margin-top:12px;

    font-size:18px;

    color:#666;

    font-weight:400;

}

.tools{

    display:grid;

    gap:20px;

}

.card{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:26px 30px;

    background:white;

    border:1px solid #ececec;

    border-radius:16px;

    text-decoration:none;

    color:inherit;

    transition:.25s;

}

.card:hover{

    transform:translateY(-4px);

    box-shadow:0 15px 35px rgba(0,0,0,.06);

}

.card h2{

    font-size:20px;

    margin-bottom:6px;

}

.card p{

    color:#666;

    font-size:15px;

}

.arrow{

    font-size:28px;

    color:#999;

    transition:.25s;

}

.card:hover .arrow{

    transform:translateX(6px);

    color:#111;

}

footer{

    margin-top:70px;

    text-align:center;

    color:#999;

    font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<header>

<h1>LCNDSN</h1>

<div class="subtitle">
Prepress Tools
</div>

</header>

<section class="tools">

<a class="card"
href="https://lcndsn.com/HF_NameGenerator/">

<div>

<h2>HF Name Generator</h2>

<p>
Generate standardized names for Heidelberg workflows.
</p>

</div>

<div class="arrow">

→

</div>

</a>

<a class="card"
href="https://lcndsn.com/Prinect_Product_Generator/">

<div>

<h2>Prinect Product Generator</h2>

<p>
Generate Product JDFs for Heidelberg Prinect.
</p>

</div>

<div class="arrow">

→

</div>

</a>

</section>

<footer>

LCNDSN © 2026

</footer>

</div>

</body>

</html>
